<style>
:root{--bg:#F5F3EE;--bg-soft:#EAE6DD;--card:#FFFFFF;--ink:#2C2824;--ink-soft:#736A5F;--line:#E0D8C8;--primary:#6B4C9A;--primary-d:#573D85;--ok:#2E8B6F;--ok-soft:#E4F2EC;--bad:#C0492F;--bad-soft:#FBE9E3;--shadow:0 1px 2px rgba(44,40,36,.04),0 10px 30px rgba(44,40,36,.07);--c-fp:#6B4C9A;--c-scala:#DC4B2F;--c-rec:#2E7D6F;--c-adt:#B8600B;--c-for:#1A6B8A;--c-types:#8B4062;--c-lambda:#4A6741;--c-tf:#4A5568;--c-code:#9C4221}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--ink);min-height:100vh;font-family:"Figtree",sans-serif;font-size:16.5px;line-height:1.55;-webkit-font-smoothing:antialiased;background-image:radial-gradient(circle at 8% -8%,rgba(107,76,154,.06),transparent 38%),radial-gradient(circle at 94% 0%,rgba(220,75,47,.04),transparent 42%)}
header{text-align:center;padding:34px 20px 8px}.kicker{font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(23px,4.4vw,32px);margin:4px 0;letter-spacing:-.01em}.sub{color:var(--ink-soft);font-size:15px}
main{max-width:700px;margin:0 auto;padding:18px 20px 80px}.anim{animation:fade .4s ease both}@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.start-card{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:26px 24px}.start-card p.lead{color:var(--ink-soft);margin-bottom:20px}.modes{display:grid;gap:12px}
.mode{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;text-align:left;cursor:pointer;border:1.5px solid var(--line);background:var(--bg);border-radius:14px;padding:16px 18px;font-family:"Figtree";font-size:16.5px;font-weight:600;color:var(--ink);transition:transform .12s,border-color .15s,background .15s}.mode:hover{transform:translateY(-2px);border-color:var(--accent,var(--primary));background:#fff}.mode .label{display:flex;align-items:center;gap:11px}.dot{width:11px;height:11px;border-radius:50%;background:var(--accent,var(--primary));flex:0 0 auto}.mode .count{font-size:13px;font-weight:600;color:var(--ink-soft);background:var(--bg-soft);padding:4px 10px;border-radius:999px}
.m-all{--accent:var(--primary)}.m-fp{--accent:var(--c-fp)}.m-scala{--accent:var(--c-scala)}.m-rec{--accent:var(--c-rec)}.m-adt{--accent:var(--c-adt)}.m-for{--accent:var(--c-for)}.m-types{--accent:var(--c-types)}.m-lambda{--accent:var(--c-lambda)}.m-tf{--accent:var(--c-tf)}.m-code{--accent:var(--c-code)}
.bar-wrap{height:7px;background:var(--bg-soft);border-radius:99px;overflow:hidden;margin-bottom:8px}.bar{height:100%;width:0;background:var(--primary);border-radius:99px;transition:width .35s ease}.meta{display:flex;justify-content:space-between;align-items:center;font-size:13.5px;color:var(--ink-soft);margin-bottom:18px;font-weight:600}
.qcard{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:24px 24px 22px}.pill{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:5px 12px;border-radius:999px;margin-bottom:14px}.pill-multi{background:#FFFBEB;color:#B45309;border:1px solid #FEF3C7;margin-left:8px}.qtext{font-family:"Fraunces",serif;font-weight:600;font-size:20px;line-height:1.3;margin-bottom:10px;letter-spacing:-.01em}.qcode{background:#2B2B2B;color:#E6DB74;font-family:"Courier New",monospace;font-size:14px;line-height:1.55;padding:14px 16px;border-radius:10px;margin-bottom:16px;white-space:pre-wrap;overflow-x:auto}
.opts{display:grid;gap:10px}.opt{display:flex;align-items:flex-start;gap:12px;width:100%;text-align:left;cursor:pointer;border:1.5px solid var(--line);background:var(--bg);border-radius:13px;padding:13px 15px;font-family:"Figtree";font-size:15.5px;color:var(--ink);transition:border-color .12s,background .12s,transform .1s}.opt code{font-family:"Courier New",monospace;font-size:14px;background:#f0ebe0;padding:1px 5px;border-radius:4px}.opt:hover:not(:disabled){border-color:var(--primary);transform:translateY(-1px)}.opt.selected{border-color:var(--primary);background:#EDE8F5}.opt.selected .key{background:var(--primary);color:#fff;border-color:var(--primary)}.opt:disabled{cursor:default;transform:none}.opt .key{flex:0 0 auto;width:25px;height:25px;border-radius:7px;background:#fff;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13.5px;color:var(--ink-soft);transition:all .2s}.opt.correct{background:var(--ok-soft);border-color:var(--ok)}.opt.correct .key{background:var(--ok);border-color:var(--ok);color:#fff}.opt.wrong{background:var(--bad-soft);border-color:var(--bad)}.opt.wrong .key{background:var(--bad);border-color:var(--bad);color:#fff}
.explain-box{margin-top:14px;padding:13px 15px;background:#F8F4FF;border:1.5px solid #D4C4EE;border-radius:12px;font-size:14.5px;color:#4A3670;line-height:1.5}.explain-box strong{color:#6B4C9A}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;border:none;font-family:"Figtree";font-weight:600;font-size:16px;border-radius:12px;padding:13px 22px;transition:transform .12s,background .15s}.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-d);transform:translateY(-1px)}.btn-primary:disabled{background:var(--line);color:var(--ink-soft);cursor:not-allowed;transform:none}.controls-row{margin-top:18px;display:flex;justify-content:flex-end;gap:10px}
.score-card{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:30px 26px;text-align:center}.ring{width:150px;height:150px;margin:6px auto 14px}.verdict-big{font-family:"Fraunces",serif;font-size:22px;font-weight:600;margin:6px 0 4px}.msg{color:var(--ink-soft);margin-bottom:22px}.res-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.review-title{font-family:"Fraunces",serif;font-weight:600;font-size:18px;margin:30px 0 12px;color:var(--bad)}.rev-item{background:var(--card);border-radius:13px;box-shadow:var(--shadow);padding:15px 17px;margin-bottom:11px;border-left:4px solid var(--bad);text-align:left}.rev-item .rq{font-weight:600;margin-bottom:7px}.rev-item .ra{font-size:14.5px;margin-bottom:3px}.rev-item .ra b{color:var(--ok)}.rev-item .yours{font-size:14px;color:var(--bad)}.rev-item .rexplain{font-size:13.5px;color:#4A3670;margin-top:6px;padding-top:6px;border-top:1px solid var(--line)}
.lex-fab{position:fixed;top:16px;right:16px;z-index:50;cursor:pointer;border:1.5px solid var(--line);background:#fff;color:var(--primary);font-family:"Figtree";font-weight:700;font-size:14px;padding:9px 14px;border-radius:999px;box-shadow:0 4px 14px rgba(44,40,36,.12);transition:transform .12s,background .15s}.lex-fab:hover{transform:translateY(-1px);background:var(--bg)}
.lex-overlay{position:fixed;inset:0;z-index:60;background:rgba(44,40,36,.42);backdrop-filter:blur(4px);display:none;align-items:flex-start;justify-content:center;padding:5vh 16px}.lex-overlay.open{display:flex;animation:fade .25s ease both}.lex-modal{background:var(--card);border-radius:18px;width:100%;max-width:640px;max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 60px rgba(44,40,36,.32);animation:pop .28s cubic-bezier(.2,.8,.3,1.1) both}@keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
.lex-modal-head{position:relative;padding:18px 18px 14px;border-bottom:1px solid var(--line)}.lex-modal-title{font-family:"Fraunces",serif;font-weight:600;font-size:20px;color:var(--primary)}.lex-close{position:absolute;top:14px;right:14px;width:34px;height:34px;border:none;background:var(--bg-soft);color:var(--ink-soft);border-radius:10px;font-size:22px;line-height:1;cursor:pointer;transition:background .15s}.lex-close:hover{background:#ECE3D4;color:var(--ink)}
.lex-list{overflow-y:auto;padding:16px 18px}.cheat-cat{margin-bottom:20px}.cheat-cat-title{font-family:"Fraunces",serif;font-size:16px;color:var(--primary);border-bottom:1px solid var(--line);padding-bottom:4px;margin-bottom:8px}.cheat-cat ul{list-style:none;padding-left:8px}.cheat-cat li{font-size:14.5px;color:var(--ink);margin-bottom:6px;position:relative;padding-left:14px}.cheat-cat li::before{content:"•";color:var(--primary);position:absolute;left:0;font-weight:bold}
@media(max-width:560px){main{padding:14px 15px 70px}.qcard,.start-card,.score-card{padding:20px 18px}.lex-fab{top:12px;right:12px;padding:8px 12px;font-size:13px}.qcode{font-size:12.5px;padding:10px 12px}}
</style>

<body>
<header><div class="kicker">DS Preparation</div><h1>Functional Programming with Scala</h1><div class="sub">M1 EFREI — 70+ questions</div></header>
<main id="app"></main>
<button id="lexFab" class="lex-fab">📚 Cheat Sheet</button>
<div id="lexModal" class="lex-overlay" aria-hidden="true"><div class="lex-modal" role="dialog"><div class="lex-modal-head"><div class="lex-modal-title">📚 Anti-Sèche</div><button id="lexClose" class="lex-close">×</button></div><div id="lexList" class="lex-list"></div></div></div>
<script>
const allQuestions = [
// ========== TRUE / FALSE (format DS Partie A) ==========
{cat:"TRUE / FALSE",q:"TRUE or FALSE: A programming paradigm is a programming language.",opts:["TRUE","FALSE"],ans:[1],multi:false,explain:"FALSE. A paradigm is a style of programming. Languages can be multi-paradigm (Scala supports OOP and FP, JavaScript supports imperative and functional)."},
{cat:"TRUE / FALSE",q:"TRUE or FALSE: The type Nothing in Scala 3 has zero instances and is a subtype of every other type.",opts:["TRUE","FALSE"],ans:[0],multi:false,explain:"TRUE. Nothing is the bottom type with no instances. Because it's a subtype of everything, Nil (List[Nothing]) and None (Option[Nothing]) work wherever List[A] or Option[A] is expected."},
{cat:"TRUE / FALSE",q:"TRUE or FALSE: The type Null in Scala 3 is a subtype of every type, including Int and Double.",opts:["TRUE","FALSE"],ans:[1],multi:false,explain:"FALSE. Null is a subtype of every REFERENCE type (AnyRef), NOT value types like Int or Double (which extend AnyVal)."},
{cat:"TRUE / FALSE",q:"TRUE or FALSE: Scala 3's Option represents a value that may or may not exist.",opts:["TRUE","FALSE"],ans:[0],multi:false,explain:"TRUE. Option[A] = Some(value) when it exists, None when it doesn't. Replaces null in FP."},
{cat:"TRUE / FALSE",q:"TRUE or FALSE: A function returning Unit always has side effects.",opts:["TRUE","FALSE"],ans:[0],multi:false,explain:"TRUE (in practice). If a function returns nothing, it must be doing something: printing, writing, mutating. Those are all side effects."},
{cat:"TRUE / FALSE",q:"TRUE or FALSE: In FP, var fields are acceptable for local accumulators inside functions.",opts:["TRUE","FALSE"],ans:[1],multi:false,explain:"FALSE. The course rules forbid var entirely. Accumulators are passed as parameters in tail-recursive calls."},
{cat:"TRUE / FALSE",q:"TRUE or FALSE: The @tailrec annotation transforms a function into a tail-recursive one.",opts:["TRUE","FALSE"],ans:[1],multi:false,explain:"FALSE. @tailrec only VERIFIES that the function is already tail-recursive. If the recursive call isn't the last operation, the compiler throws an error."},
{cat:"TRUE / FALSE",q:"TRUE or FALSE: Covariance (+A) means that if Dog <: Animal, then List[Dog] <: List[Animal].",opts:["TRUE","FALSE"],ans:[0],multi:false,explain:"TRUE. Covariance preserves the subtyping direction. Safe for immutable read-only containers like List."},
{cat:"TRUE / FALSE",q:"TRUE or FALSE: A mutable collection (using var) can safely be covariant.",opts:["TRUE","FALSE"],ans:[1],multi:false,explain:"FALSE. You could assign Box[Dog] to Box[Animal], then write box.content = Cat(), breaking type safety. The compiler forbids this."},
{cat:"TRUE / FALSE",q:"TRUE or FALSE: For-comprehensions in Scala can only be used with collections like List.",opts:["TRUE","FALSE"],ans:[1],multi:false,explain:"FALSE. They work with ANY type implementing map, flatMap, withFilter: Option, Try, Either, Future, custom types like MyList."},
{cat:"TRUE / FALSE",q:"TRUE or FALSE: A pure function can read a global variable as long as it doesn't modify it.",opts:["TRUE","FALSE"],ans:[1],multi:false,explain:"FALSE. A pure function depends ONLY on its declared inputs. Reading a global is a hidden input: if someone changes it, the function returns different results."},
{cat:"TRUE / FALSE",q:"TRUE or FALSE: Immutability means that once created, a data structure cannot be changed. You create a new copy instead.",opts:["TRUE","FALSE"],ans:[0],multi:false,explain:"TRUE. In Scala, use .copy() on case classes to create modified versions while the original stays untouched."},
{cat:"TRUE / FALSE",q:"TRUE or FALSE: In lambda calculus, a bound variable is one that appears in the body but is NOT declared as a parameter.",opts:["TRUE","FALSE"],ans:[1],multi:false,explain:"FALSE. That's a FREE variable. A BOUND variable appears both as parameter AND in the body. In λx.y, y is free."},
{cat:"TRUE / FALSE",q:"TRUE or FALSE: Either in Scala 3 is right-biased: map and flatMap operate on the Right value.",opts:["TRUE","FALSE"],ans:[0],multi:false,explain:"TRUE. Right = success, Left = error. map/flatMap transform the Right side. Left passes through unchanged."},
{cat:"TRUE / FALSE",q:"TRUE or FALSE: case classes auto-generate equals, hashCode, toString, copy, and pattern matching support.",opts:["TRUE","FALSE"],ans:[0],multi:false,explain:"TRUE. All generated by the compiler. This is why case classes are the standard data structure in Scala FP."},
{cat:"TRUE / FALSE",q:"TRUE or FALSE: A sealed trait allows exhaustiveness checking because all subtypes must be in the same file.",opts:["TRUE","FALSE"],ans:[0],multi:false,explain:"TRUE. sealed = no subtypes outside this file. The compiler knows every case and warns if a match misses one."},

// ========== CODE COMPLETION (format DS Partie B) ==========
{cat:"Code Completion",q:"Fill the blanks: <code>def filterOdd(xs: ____): List[Int] = xs.____(n => n % 2 == 1)</code>",opts:["<code>List[Int]</code> and <code>filter</code>","<code>Seq[Int]</code> and <code>map</code>","<code>List[Int]</code> and <code>flatMap</code>","<code>Array[Int]</code> and <code>filter</code>"],ans:[0],multi:false,explain:"Takes a List[Int], uses .filter with a predicate keeping odd numbers."},
{cat:"Code Completion",q:"<code>filterOdd(List(1,2,3,4,5))</code> evaluates to:",opts:["<code>List(1, 3, 5)</code>","<code>List(2, 4)</code>","<code>List()</code>","<code>List(1, 2, 3, 4, 5)</code>"],ans:[0],multi:false,explain:"filter keeps elements where predicate is true. 1,3,5 are odd."},
{cat:"Code Completion",q:"Fill in the recursive filter:",code:"def filterThree(xs: List[Int]): List[Int] = xs match\n  case Nil => ____\n  case head :: tail if head % 3 ____ => head :: filterThree(____)\n  case _ :: tail => filterThree(____)",opts:["<code>Nil</code>, <code>== 0</code>, <code>tail</code>, <code>tail</code>","<code>List()</code>, <code>!= 0</code>, <code>xs</code>, <code>xs</code>","<code>0</code>, <code>== 0</code>, <code>tail</code>, <code>tail</code>","<code>Nil</code>, <code>== 1</code>, <code>tail</code>, <code>tail</code>"],ans:[0],multi:false,explain:"Base case: Nil. Guard checks multiples of 3 (head % 3 == 0). Recurse on tail in both cases."},
{cat:"Code Completion",q:"What do these Either expressions evaluate to?",code:"Right(10).map(_ + 5)         shouldBe ____\nLeft(\"err\").map((x:Int)=>x*2) shouldBe ____\nRight(7).filterOrElse(_>10, \"small\") shouldBe ____",opts:["<code>Right(15)</code>, <code>Left(\"err\")</code>, <code>Left(\"small\")</code>","<code>Right(15)</code>, <code>Right(0)</code>, <code>Right(7)</code>","<code>Some(15)</code>, <code>None</code>, <code>Left(\"small\")</code>","<code>Right(15)</code>, <code>Left(\"err\")</code>, <code>Right(7)</code>"],ans:[0],multi:false,explain:"Right(10).map(+5) = Right(15). Left.map = Left unchanged. Right(7), 7 is NOT > 10, so filterOrElse returns Left(\"small\")."},
{cat:"Code Completion",q:"What is the result and its type?",code:"val r = for {\n  a <- List(1, 2, 3)\n  b <- List(10, 20)\n} yield a + b",opts:["<code>List[Int]</code> = <code>List(11,21,12,22,13,23)</code>","<code>List[Int]</code> = <code>List(11,22,33)</code>","<code>Option[Int]</code> = <code>Some(36)</code>","<code>List[Int]</code> = <code>List(11,12,13,21,22,23)</code>"],ans:[0],multi:false,explain:"Two generators = flatMap + map. For each a, iterate all b: 1+10, 1+20, 2+10, 2+20, 3+10, 3+20."},
{cat:"Code Completion",q:"Desugar this for-comprehension:",code:"for {\n  x <- List(1,2,3,4)\n  if x % 2 == 0\n  y <- List(x, x*10)\n} yield y",opts:["<code>List(1,2,3,4).filter(_%2==0).flatMap(x => List(x,x*10).map(y=>y))</code>","<code>List(1,2,3,4).flatMap(x => List(x,x*10).filter(_%2==0))</code>","<code>List(1,2,3,4).map(x => List(x,x*10)).filter(_%2==0)</code>","<code>List(1,2,3,4).filter(_%2==0).map(x => List(x,x*10))</code>"],ans:[0],multi:false,explain:"Guard -> filter. Non-last generator -> flatMap. Last generator -> map. Result: List(2,20,4,40)."},
{cat:"Code Completion",q:"Complete the HOF:",code:"def applyTwice(f: ____, x: Int): Int = f(f(x))\ndef addThree(n: Int): Int = n + 3\napplyTwice(addThree, 10) shouldBe ____",opts:["<code>Int => Int</code>, result is <code>16</code>","<code>(Int,Int) => Int</code>, result is <code>16</code>","<code>Int => Int</code>, result is <code>13</code>","<code>Int => Unit</code>, result is <code>16</code>"],ans:[0],multi:false,explain:"f: Int => Int. applyTwice = f(f(10)) = addThree(addThree(10)) = addThree(13) = 16."},
{cat:"Code Completion",q:"Fill the types:",code:"def transform(f: ____, xs: List[String]): List[Int] =\n  xs.map(x => f(x))\ntransform(s => s.length, List(\"hi\",\"hello\")) shouldBe ____",opts:["<code>String => Int</code>, result <code>List(2,5)</code>","<code>Int => String</code>, result <code>List(2,5)</code>","<code>String => String</code>, result <code>List(\"hi\",\"hello\")</code>","<code>String => Int</code>, result <code>List(5,2)</code>"],ans:[0],multi:false,explain:"f takes String, returns Int (List[Int] output). \"hi\".length=2, \"hello\".length=5."},

// ========== FP PRINCIPLES ==========
{cat:"FP Principles",q:"Which of these functions is pure?",code:"def a(x: Int): Int = x * x\ndef b(x: Int): Unit = println(x)\ndef c(x: Int): Long = System.currentTimeMillis() + x",opts:["<code>a</code> — depends only on input, no side effects","<code>b</code> — println is harmless","<code>c</code> — always returns a Long","All three are pure"],ans:[0],multi:false,explain:"a is pure: same input, same output, no side effects. b has I/O. c depends on system time."},
{cat:"FP Principles",q:"What does 'referentially transparent' mean?",opts:["The source code is visible","The function can be replaced by its return value without changing the program","The function uses transparent types","The function has no return type"],ans:[1],multi:false,explain:"You can substitute f(x) with its result everywhere and the program behaves the same."},
{cat:"FP Principles",q:"Which statement about immutability is FALSE?",opts:["Easier to reason about","Enables safe concurrency","Always more efficient than mutable","Requires creating new copies"],ans:[2],multi:false,explain:"Immutability can be LESS efficient for large or frequently updated structures."},
{cat:"FP Principles",q:"Which are expressions (not statements)?",opts:["<code>if x > 0 then x else -x</code>","<code>println(\"hello\")</code>","<code>val y = 42</code>","<code>for { x <- xs } yield x * 2</code>"],ans:[0,3],multi:true,explain:"Expressions return a value. if/else and for/yield do. println returns Unit. val is a declaration."},

// ========== SCALA BASICS ==========
{cat:"Scala Basics",q:"What is the output?",code:"def myDef: Int = { print(\"D\"); 42 }\nlazy val myLazy: Int = { print(\"L\"); 42 }\nval myVal: Int = { print(\"V\"); 42 }\nprintln(\"---\")\nmyDef\nmyDef\nmyLazy\nmyLazy",opts:["V---DDLL","V---DDL","---VDDLL","V---DL"],ans:[1],multi:false,explain:"val -> V (at definition). --- printed. def -> D, D (each call). lazy val -> L (first access only). Total: V---DDL."},
{cat:"Scala Basics",q:"Call-by-value vs call-by-name?",code:"def byValue(t: Long): Long = { t; t }\ndef byName(t: => Long): Long = { t; t }",opts:["byValue evaluates t once before entering; byName evaluates t each time used","Identical","byName once; byValue each time","byValue for primitives; byName for objects"],ans:[0],multi:false,explain:"Call-by-value: evaluated once before entry. Call-by-name (=> syntax): re-evaluated at each use in the body."},
{cat:"Scala Basics",q:"What does val guarantee?",opts:["Object cannot be mutated","Reference cannot be reassigned, but object might be mutable","Thread-safe","Lazy computation"],ans:[1],multi:false,explain:"val prevents reassignment. A mutable object (ListBuffer) can still change internally."},
{cat:"Scala Basics",q:"Valid Scala for <code>1 + 2</code>?",opts:["<code>1.+(2)</code>","<code>+(1, 2)</code>","<code>Int.add(1, 2)</code>","<code>1.add(2)</code>"],ans:[0],multi:false,explain:"Operators are methods. 1 + 2 = 1.+(2). Infix: a.method(b) = a method b."},

// ========== FUNCTIONS ==========
{cat:"Functions",q:"What does this evaluate to?",code:"def sumOf(x: Int, y: Int, f: Int => Int): Int = f(x) + f(y)\nsumOf(3, 4, x => x * x)",opts:["7","12","25","49"],ans:[2],multi:false,explain:"f(3)=9, f(4)=16. 9+16=25."},
{cat:"Functions",q:"What is currying?",opts:["Too many arguments","Transforming (A,B)=>C into A=>B=>C","Making functions impure","Renaming parameters"],ans:[1],multi:false,explain:"Chain of single-parameter functions. Enables partial application."},
{cat:"Functions",q:"What does repeatTwo(\"ha\") return?",code:"def repeat(n: Int)(m: String): String =\n  if n <= 0 then \"\" else m + repeat(n-1)(m)\nval repeatTwo = repeat(2)(_)",opts:["\"ha\"","\"haha\"","\"hahaha\"","Compile error"],ans:[1],multi:false,explain:"repeat(2)(_) fixes n=2. repeatTwo(\"ha\") = \"ha\"+\"ha\" = \"haha\"."},
{cat:"Functions",q:"What is a closure?",opts:["Garbage collected function","Captures variables from enclosing scope","Runs in separate thread","Called only once"],ans:[1],multi:false,explain:"Closes over variables from outside its parameter list."},
{cat:"Functions",q:"What is Function1[Int, Int]?",opts:["The trait behind every Int => Int lambda","Called only once","A math function","Abstract class for integers"],ans:[0],multi:false,explain:"Every lambda compiles to FunctionN. Int => Int = Function1[Int, Int]. f(6) = f.apply(6)."},
{cat:"Functions",q:"What is a PartialFunction?",opts:["Partially applied function","Defined only for some inputs, throws MatchError on others","Returns Option","Deprecated feature"],ans:[1],multi:false,explain:"Written as { case ... } without match. isDefinedAt() checks before calling."},

// ========== RECURSION ==========
{cat:"Recursion",q:"Why does factorial(50000) crash?",code:"def factorial(n: Int): BigInt =\n  if n <= 0 then BigInt(1)\n  else BigInt(n) * factorial(n-1)",opts:["BigInt overflow","50000 stack frames exceed JVM stack","Wrong base case","Scala limit"],ans:[1],multi:false,explain:"Each call waits for the next before multiplying. 50000 frames overflow the stack."},
{cat:"Recursion",q:"What makes a call tail-recursive?",opts:["Using @tailrec","Recursive call is the very last operation","Using inner helper","Calling itself once"],ans:[1],multi:false,explain:"Last operation = tail-recursive. @tailrec only verifies, doesn't create it."},
{cat:"Recursion",q:"Which is tail-recursive?",code:"// A\ndef factA(n: Int): BigInt =\n  if n<=0 then 1 else n * factA(n-1)\n// B\ndef factB(n: Int): BigInt =\n  @tailrec\n  def loop(k:Int, acc:BigInt):BigInt =\n    if k<=0 then acc else loop(k-1, acc*k)\n  loop(n, 1)",opts:["A","B","Both","Neither"],ans:[1],multi:false,explain:"A: last op is n * factA(n-1) (multiply after return). B: last op is loop(k-1, acc*k). B is tail-recursive."},
{cat:"Recursion",q:"Role of the accumulator?",opts:["Count calls","Store partial result so recursive call is last op","Limit depth","Replace return type"],ans:[1],multi:false,explain:"Carries intermediate result forward. At base case, accumulator IS the answer."},
{cat:"Recursion",q:"Why is naive Fibonacci more expensive than factorial?",opts:["Bigger numbers","2 calls per level (exponential) vs 1 (linear)","More base cases","Can't use BigInt"],ans:[1],multi:false,explain:"factorial: O(n). fibonacci: O(2^n). fibonacci(2) computed 13 times during fibonacci(8)."},
{cat:"Recursion",q:"What annotation verifies tail recursion?",opts:["@recursive","@tailrec","@optimized","@inline"],ans:[1],multi:false,explain:"scala.annotation.tailrec. Compile error if not truly tail-recursive."},

// ========== ADT & PATTERNS ==========
{cat:"ADT & Patterns",q:"What is an ADT?",opts:["Class with +/*","sealed trait + case classes for all variants","Enum of integers","Generic with bounds"],ans:[1],multi:false,explain:"sealed = all subtypes in same file. Compiler checks exhaustiveness."},
{cat:"ADT & Patterns",q:"What does this evaluate to?",code:"val t = Node(1, Leaf(20), Leaf(22))\nt match\n  case Node(_, Leaf(x), Leaf(y)) => x + y\n  case _ => -1",opts:["1","42","20","-1"],ans:[1],multi:false,explain:"_ ignores 1, x=20, y=22. 20+22=42."},
{cat:"ADT & Patterns",q:"Non-exhaustive match on sealed trait?",opts:["Compile error","Compile warning + MatchError at runtime","Nothing","Default auto-added"],ans:[1],multi:false,explain:"Compiler warns. Unmatched value at runtime throws MatchError."},
{cat:"ADT & Patterns",q:"== vs eq on case classes?",opts:["Both true","Both false","== true (structural), eq false (different objects)","== false, eq true"],ans:[2],multi:false,explain:"== compares field values. eq compares JVM object references."},
{cat:"ADT & Patterns",q:"What does .copy() do?",opts:["Deep clone","New instance, some fields changed, original untouched","Move memory","Convert to tuple"],ans:[1],multi:false,explain:"Creates new instance. Specify fields to change: h.copy(power=\"Flight\"). Original unchanged."},
{cat:"ADT & Patterns",q:"Scala 3 enum built-in methods?",opts:["ordinal, toString, values, fromOrdinal, valueOf","Only toString","name and id","None"],ans:[0],multi:false,explain:"All auto-generated. Can also have parameters and methods."},

// ========== FOR COMPREHENSIONS ==========
{cat:"For Comprehensions",q:"For-comprehension is sugar for?",opts:["while loop","Chained flatMap, map, withFilter","SQL queries","Pattern matching"],ans:[1],multi:false,explain:"Compiler translates to flatMap (non-last), withFilter (guards), map (last + yield)."},
{cat:"For Comprehensions",q:"Desugar this:",code:"for {\n  x <- xs if x % 2 == 0\n  y <- ys\n} yield x + y",opts:["xs.map(x => ys.map(y => x+y))","xs.filter(_%2==0).flatMap(x => ys.map(y => x+y))","xs.flatMap(x => ys.filter(_%2==0).map(y => x+y))","xs.flatMap(x => ys.flatMap(y => x+y))"],ans:[1],multi:false,explain:"Guard -> filter. Non-last generator -> flatMap. Last -> map."},
{cat:"For Comprehensions",q:"Methods needed for for + yield?",opts:["Only foreach","map + flatMap (+ withFilter for guards)","filter + reduce","head + tail"],ans:[1],multi:false,explain:"map for single generator. flatMap for multiple. withFilter for guards."},
{cat:"For Comprehensions",q:"flatMap vs map?",opts:["Identical","map transforms; flatMap transforms then flattens","flatMap is lazy map","flatMap only for Option"],ans:[1],multi:false,explain:"map: List(List(1,1),List(2,2)). flatMap flattens: List(1,1,2,2)."},
{cat:"For Comprehensions",q:"How are Scala Lists built?",opts:["Arrays","Linked lists with :: and Nil","Hash maps","Trees"],ans:[1],multi:false,explain:"Singly-linked immutable. 1 :: 2 :: 3 :: Nil. :: is right-associative."},
{cat:"For Comprehensions",q:"What does this match?",code:"List(1,2,3,4) match\n  case 1 :: 2 :: rest => s\"$rest\"",opts:["\"List(1,2,3,4)\"","\"List(3, 4)\"","\"List(2,3,4)\"","MatchError"],ans:[1],multi:false,explain:"1 :: 2 :: rest matches first two elements. rest = List(3,4)."},

// ========== TYPE CLASSES ==========
{cat:"Type Classes",q:"What is a type class?",opts:["Class with type param","Trait with operations, instances via given, consumed via using","Final class","Primitive-only"],ans:[1],multi:false,explain:"Define trait. Provide instances with given. Consume with using. Compiler resolves by type."},
{cat:"Type Classes",q:"sumList(List(3,7,5)) returns?",code:"given Monoid[Int] with\n  def add(x:Int,y:Int) = x+y\n  def unit = 0\ndef sumList[A](xs:List[A])(using m:Monoid[A]):A =\n  if xs.isEmpty then m.unit\n  else m.add(xs.head, sumList(xs.tail))",opts:["0","15","List(3,7,5)","Compile error"],ans:[1],multi:false,explain:"Compiler uses given Monoid[Int]. Folds: 3+7+5 = 15."},
{cat:"Type Classes",q:"Scala 3 equivalent of implicit val?",opts:["given","val","lazy val","override val"],ans:[0],multi:false,explain:"given provides instances, using consumes them. Replaces implicit."},
{cat:"Type Classes",q:"What does implicit def do here?",code:"class IntWrapper(val n:Int){def isOdd = n%2 != 0}\nimplicit def wrap(v:Int):IntWrapper = IntWrapper(v)\n19.isOdd",opts:["IntWrapper subtype of Int","Compiler auto-converts Int to IntWrapper when isOdd called","Overrides Int methods","isOdd on all types"],ans:[1],multi:false,explain:"Int has no isOdd. Compiler finds implicit conversion wrap(19).isOdd."},

// ========== OPTION / TRY / EITHER ==========
{cat:"Option / Try / Either",q:"What does this return?",code:"for {\n  x <- Some(1)\n  y <- None\n  z <- Some(3)\n} yield x + y + z",opts:["Some(4)","None","Some(1)","NullPointerException"],ans:[1],multi:false,explain:"Short-circuits on None. y <- None stops everything. Result: None."},
{cat:"Option / Try / Either",q:"map vs flatMap on Option?",code:"Some(1).map(x => Some(x+1))\nSome(1).flatMap(x => Some(x+1))",opts:["map: Some(Some(2)), flatMap: Some(2)","Both Some(2)","map: Some(2), flatMap: Some(Some(2))","Both 2"],ans:[0],multi:false,explain:"map wraps: Some(Some(2)). flatMap flattens: Some(2)."},
{cat:"Option / Try / Either",q:"Which side of Either is success?",opts:["Left","Right","Both","Neither"],ans:[1],multi:false,explain:"Right = success (right = correct). Left = error."},
{cat:"Option / Try / Either",q:"None.getOrElse(42)?",opts:["None","Some(42)","42","NoSuchElementException"],ans:[2],multi:false,explain:"Returns the default value: 42 (not Some(42))."},
{cat:"Option / Try / Either",q:"Nil, None, Nothing, Unit, null?",opts:["Nil=empty List, None=empty Option, Nothing=bottom type, Unit=void, null=Java legacy","All equivalent to null","Nil=Option, None=List","Nothing=empty List"],ans:[0],multi:false,explain:"All different. Nothing has 0 instances, subtype of everything. null: never use."},
{cat:"Option / Try / Either",q:"What is Future[A]?",opts:["Past value","Async computation: Success or Failure","lazy val","Mutable variable"],ans:[1],multi:false,explain:"Same map/flatMap pattern as Option/Try. onComplete for result."},

// ========== VARIANCE ==========
{cat:"Variance & Generics",q:"Invariant Box[A]: Box[Dog] <: Box[Animal]?",opts:["Yes","No, no subtype relationship","Only if Dog extends Animal","Only with var"],ans:[1],multi:false,explain:"Invariant = no relationship, even though Dog <: Animal."},
{cat:"Variance & Generics",q:"Why is Box[+A](var content: A) forbidden?",opts:["Covariance doesn't exist","Could put Cat in Dog box via upcasting","+ invalid","var deprecated"],ans:[1],multi:false,explain:"val b: Box[Animal] = Box[Dog](rex). b.content = Cat() would compile but is unsafe."},
{cat:"Variance & Generics",q:"Covariance (+A) allows?",opts:["Nothing","ImmutableBox[Dog] assignable to ImmutableBox[Animal]","Modifying content","Primitives only"],ans:[1],multi:false,explain:"Dog <: Animal => ImmutableBox[Dog] <: ImmutableBox[Animal]. Safe: val is read-only."},
{cat:"Variance & Generics",q:"Contravariance (-A) means:",opts:["Serializer[Animal] <: Serializer[Dog]","Serializer[Dog] <: Serializer[Animal]","Same direction","Not supported"],ans:[0],multi:false,explain:"Reversed. Animal serializer handles any animal including dogs."},
{cat:"Variance & Generics",q:"A <: Animal means?",opts:["A supertype","A must be subtype (upper bound)","A equals Animal","Unrelated"],ans:[1],multi:false,explain:"<: is upper bound. A can be Animal or any subtype."},
{cat:"Variance & Generics",q:"In MyList[+A], what type is Empty?",opts:["MyList[Any]","MyList[Nothing]","MyList[Null]","MyList[Unit]"],ans:[1],multi:false,explain:"Nothing is bottom type + covariance = MyList[Nothing] <: MyList[A] for any A."},

// ========== LAMBDA CALCULUS ==========
{cat:"Lambda Calculus",q:"(λx.x)a evaluates to?",opts:["λx.x","a","x","λa.a"],ans:[1],multi:false,explain:"Identity function. β-reduction: substitute x with a. Result: a."},
{cat:"Lambda Calculus",q:"(λx.y)a evaluates to?",opts:["a","x","y","λx.a"],ans:[2],multi:false,explain:"y is free (not bound to x). Substituting x doesn't affect y."},
{cat:"Lambda Calculus",q:"λxyz.xyz equivalent to?",opts:["λx.(λy.(λz.xyz))","λ(x,y,z).xyz","(λx.x)(λy.y)(λz.z)","λx.λy.λz.z"],ans:[0],multi:false,explain:"Currying: multi-param = nested single-param functions."},
{cat:"Lambda Calculus",q:"What does β-reduction do?",opts:["Renames variables","Substitutes argument into function body","Removes variables","Creates Church numerals"],ans:[1],multi:false,explain:"(λx.body)arg → body[x := arg]. α-conversion renames."},
{cat:"Lambda Calculus",q:"Church numeral TWO?",opts:["λf.λx.x","λf.λx.(f x)","λf.λx.(f(f x))","λf.λx.(f(f(f x)))"],ans:[2],multi:false,explain:"N = apply f N times. ZERO: 0. ONE: f once. TWO: f(f x)."},
];
const cheatSheet = {
  "FP Principles":["Pure function: same input → same output, zero side effects","Referentially transparent: replace call with its value","Immutability: create new copies, never mutate","Expression = returns a value. Statement = action. FP uses only expressions","Every if must have an else"],
  "Scala Basics":["val: evaluated once, never re-evaluated. var: FORBIDDEN","lazy val: first access then cached. def: every call","Call-by-value (t: Long): once before entry","Call-by-name (t: => Long): re-evaluated each use","Operators are methods: 1+2 = 1.+(2)"],
  "Functions":["HOF: takes or returns a function. Int => Int is a type","Currying: (A,B)=>C → A=>B=>C. Partial application: fix some args",".curried / Function.uncurried to convert","Closure: captures enclosing scope variables","Function1[A,B] = A => B. f(6) = f.apply(6)","PartialFunction: some inputs only, MatchError on others"],
  "Recursion":["Recipe: 1. Base case → 2. Smaller problem → 3. Combine","Tail-rec: recursive call is the LAST operation","@tailrec: compiler verifies. Fails if not tail-rec","Accumulator: carries partial result → call becomes last op","Seeds: sum→0, product→1, concat→\"\", list→Nil","No acc: searching (last, nth, contains). With acc: building (reverse, length, sum)"],
  "ADT & Patterns":["ADT = sealed trait + case classes","case class: equals, hashCode, toString, copy, apply, pattern matching","5 forms: exact value, extract var, nested, guard, type-only","Non-exhaustive on sealed: warning + MatchError","enum: ordinal, toString, values, fromOrdinal, valueOf"],
  "For Comprehensions":["x <- xs (not last) → flatMap","x <- xs (last) + yield → map","if guard → withFilter / filter","flatMap = map then flatten","Works on List, Option, Try, Either, Future, MyList...","List = :: (Cons) + Nil"],
  "Type Classes":["Trait + given instances + using parameters","given: provide. using: consume automatically","Compiler resolves by type parameter","implicit def: auto-conversion when method not found"],
  "Option / Try / Either":["Option: Some(v) or None. Try: Success(v) or Failure(e). Either: Right(v) or Left(e)","Short-circuit: None/Failure/Left stops the chain","Nil=empty List, None=empty Option, Nothing=bottom type, Unit=void","Null <: every ref type. Nothing <: every type"],
  "Variance & Generics":["Invariant A: no relation. Covariant +A: preserved. Contravariant -A: reversed","var + covariant = FORBIDDEN","A <: B (upper/subtype). A >: B (lower/supertype)","MyList[+A]: covariant. Empty = MyList[Nothing]"],
  "Lambda Calculus":["(λx.body)arg → body[x:=arg] (β-reduction)","Bound: param+body. Free: not declared","α-conversion: rename. Currying: λxyz = λx.(λy.(λz...))","ZERO=λf.λx.x ONE=λf.λx.(fx) TWO=λf.λx.(f(fx))","TRUE=λx.λy.x FALSE=λx.λy.y"]
};
const app=document.getElementById('app');let pool=[],idx=0,score=0,wrong=[],selectedOpts=[],isSubmitted=false;
const getColor=c=>{const m={'FP Principles':'--c-fp','Scala Basics':'--c-scala','Functions':'--c-scala','Recursion':'--c-rec','ADT & Patterns':'--c-adt','For Comprehensions':'--c-for','Type Classes':'--c-for','Option / Try / Either':'--c-types','Variance & Generics':'--c-types','Lambda Calculus':'--c-lambda','TRUE / FALSE':'--c-tf','Code Completion':'--c-code'};return`var(${m[c]||'--primary'})`};
const shuffle=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r};
const lexList=document.getElementById('lexList');lexList.innerHTML=Object.keys(cheatSheet).map(c=>`<div class="cheat-cat"><div class="cheat-cat-title">${c}</div><ul>${cheatSheet[c].map(i=>`<li>${i}</li>`).join('')}</ul></div>`).join('');
const lexFab=document.getElementById('lexFab'),lexModal=document.getElementById('lexModal'),lexClose=document.getElementById('lexClose');
lexFab.onclick=()=>{lexModal.classList.add('open');lexModal.setAttribute('aria-hidden','false')};
const closeLex=()=>{lexModal.classList.remove('open');lexModal.setAttribute('aria-hidden','true')};
lexClose.onclick=closeLex;lexModal.addEventListener('click',e=>{if(e.target===lexModal)closeLex()});
function renderStart(){const grps={all:null,tf:['TRUE / FALSE'],code:['Code Completion'],fp:['FP Principles'],scala:['Scala Basics','Functions'],rec:['Recursion'],adt:['ADT & Patterns'],forcomp:['For Comprehensions'],types:['Type Classes','Option / Try / Either','Variance & Generics'],lambda:['Lambda Calculus']};const cnt=g=>g?allQuestions.filter(x=>g.includes(x.cat)).length:allQuestions.length;
app.innerHTML=`<div class="start-card anim"><p class="lead">70+ questions couvrant tout le cours. Format DS: TRUE/FALSE, complétion de code, QCM.</p><div class="modes">
<button class="mode m-all" data-t="all"><span class="label"><span class="dot"></span>Tous les thèmes</span><span class="count">${cnt(grps.all)}q</span></button>
<button class="mode m-tf" data-t="tf"><span class="label"><span class="dot"></span>TRUE / FALSE (DS Partie A)</span><span class="count">${cnt(grps.tf)}q</span></button>
<button class="mode m-code" data-t="code"><span class="label"><span class="dot"></span>Code Completion (DS Partie B)</span><span class="count">${cnt(grps.code)}q</span></button>
<button class="mode m-fp" data-t="fp"><span class="label"><span class="dot"></span>FP Principles</span><span class="count">${cnt(grps.fp)}q</span></button>
<button class="mode m-scala" data-t="scala"><span class="label"><span class="dot"></span>Scala, Functions & Currying</span><span class="count">${cnt(grps.scala)}q</span></button>
<button class="mode m-rec" data-t="rec"><span class="label"><span class="dot"></span>Recursion & Tail Recursion</span><span class="count">${cnt(grps.rec)}q</span></button>
<button class="mode m-adt" data-t="adt"><span class="label"><span class="dot"></span>ADT & Pattern Matching</span><span class="count">${cnt(grps.adt)}q</span></button>
<button class="mode m-for" data-t="forcomp"><span class="label"><span class="dot"></span>For Comprehensions</span><span class="count">${cnt(grps.forcomp)}q</span></button>
<button class="mode m-types" data-t="types"><span class="label"><span class="dot"></span>Types, Variance & Option/Try/Either</span><span class="count">${cnt(grps.types)}q</span></button>
<button class="mode m-lambda" data-t="lambda"><span class="label"><span class="dot"></span>Lambda Calculus</span><span class="count">${cnt(grps.lambda)}q</span></button>
</div></div>`;app.querySelectorAll('.mode').forEach(b=>{b.onclick=()=>{const t=b.dataset.t,g=grps[t];startQuiz(g?allQuestions.filter(x=>g.includes(x.cat)):allQuestions)}});}
function startQuiz(qs){pool=shuffle(qs.map(q=>{const oi=q.opts.map((t,i)=>({text:t,isCorrect:q.ans.includes(i)}));return{cat:q.cat,q:q.q,code:q.code||null,multi:q.multi,opts:shuffle(oi),explain:q.explain||''}}));idx=0;score=0;wrong=[];renderQuestion();}
function renderQuestion(){selectedOpts=[];isSubmitted=false;const it=pool[idx],prog=Math.round((idx/pool.length)*100),col=getColor(it.cat);const cb=it.code?`<div class="qcode">${it.code.replace(/</g,'&lt;')}</div>`:'';
app.innerHTML=`<div class="anim"><div class="bar-wrap"><div class="bar" style="width:${prog}%"></div></div><div class="meta"><span>Question ${idx+1}/${pool.length}</span><span>Score: ${score}</span></div><div class="qcard"><span class="pill" style="color:${col};background:color-mix(in srgb,${col} 10%,transparent)">${it.cat}</span>${it.multi?'<span class="pill pill-multi">Choix Multiples</span>':''}<div class="qtext">${it.q}</div>${cb}<div class="opts" id="opts">${it.opts.map((o,i)=>`<button class="opt" data-i="${i}"><span class="key">${String.fromCharCode(65+i)}</span><span>${o.text}</span></button>`).join('')}</div><div class="controls-row" id="cr">${it.multi?'<button class="btn btn-primary" id="ckBtn" disabled>Valider</button>':''}</div></div></div>`;
app.querySelectorAll('.opt').forEach(b=>{b.onclick=()=>{if(isSubmitted)return;const i=+b.dataset.i;if(!it.multi){selectedOpts=[i];submitAnswer();}else{if(selectedOpts.includes(i)){selectedOpts=selectedOpts.filter(v=>v!==i);b.classList.remove('selected');}else{selectedOpts.push(i);b.classList.add('selected');}document.getElementById('ckBtn').disabled=selectedOpts.length===0;}}});if(it.multi)document.getElementById('ckBtn').onclick=submitAnswer;}
function submitAnswer(){isSubmitted=true;const it=pool[idx],btns=app.querySelectorAll('.opt'),cr=document.getElementById('cr');let uc=0,ac=it.opts.filter(o=>o.isCorrect).length;btns.forEach((b,j)=>{b.disabled=true;b.classList.remove('selected');const sel=selectedOpts.includes(j),cor=it.opts[j].isCorrect;if(cor){b.classList.add('correct');if(sel)uc++;}if(sel&&!cor)b.classList.add('wrong');});const ok=selectedOpts.length===ac&&uc===ac;if(ok)score++;else{const ct=it.opts.filter(o=>o.isCorrect).map(o=>o.text).join('<br>');const ut=selectedOpts.map(i=>it.opts[i].text).join('<br>');wrong.push({q:it.q,cat:it.cat,correct:ct,yours:ut||'Aucune',explain:it.explain});}const eh=it.explain?`<div class="explain-box"><strong>💡</strong> ${it.explain}</div>`:'';cr.innerHTML=`${eh}<div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="btn btn-primary" id="nBtn">${idx+1===pool.length?'Résultats →':'Suivante →'}</button></div>`;document.getElementById('nBtn').onclick=()=>{idx++;idx<pool.length?renderQuestion():renderResults();};}
function renderResults(){const t=pool.length,p=Math.round((score/t)*100);let v,m,c;if(p>=80){v="Excellent !";m="Relis tes erreurs.";c="var(--ok)";}else if(p>=60){v="Bien joué";m="Cible les points ratés.";c="var(--primary)";}else{v="On s'accroche";m="Relis la Cheat Sheet.";c="var(--bad)";}const C=2*Math.PI*52,off=C*(1-score/t);const rev=wrong.length?`<div class="review-title">À revoir (${wrong.length})</div>${wrong.map(w=>`<div class="rev-item"><div class="rq">[${w.cat}] ${w.q}</div><div class="ra">Réponse:<br><b>${w.correct}</b></div><div class="yours">Toi:<br>${w.yours}</div>${w.explain?`<div class="rexplain">💡 ${w.explain}</div>`:''}</div>`).join('')}`:`<p style="text-align:center;color:var(--ok);font-weight:600;margin-top:24px">Sans-faute</p>`;
app.innerHTML=`<div class="score-card anim"><svg class="ring" viewBox="0 0 120 120"><circle cx="60" cy="60" r="52" fill="none" stroke="var(--bg-soft)" stroke-width="12"/><circle cx="60" cy="60" r="52" fill="none" stroke="${c}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 60 60)" style="transition:stroke-dashoffset 1s ease"/><text x="60" y="58" text-anchor="middle" fill="var(--ink)" font-family="Fraunces" font-size="40" font-weight="600">${score}/${t}</text><text x="60" y="76" text-anchor="middle" fill="var(--ink-soft)" font-size="14" font-weight="600">${p}%</text></svg><div class="verdict-big">${v}</div><div class="msg">${m}</div><div class="res-actions"><button class="btn btn-primary" id="home">Menu</button></div></div>${rev}`;document.getElementById('home').onclick=renderStart;}
renderStart();
</script></body></html>
